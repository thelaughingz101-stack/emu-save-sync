appId: com.thelaughingz101.emu-save-sync
productName: Emu Save Sync
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.eslintrc.yml,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!resources/syncthing/**'
extraResources:
  - from: resources/syncthing/
    to: syncthing
    filter:
      - syncthing.exe
      - syncthing
asarUnpack:
  - resources/**
win:
  executableName: emu-save-sync
  icon: build/icon.ico
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
  icon: build/icon.png
  maintainer: thelaughingz101
  category: Game
  synopsis: P2P emulator save sync via Syncthing
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false